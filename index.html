    data.persons.forEach(p=>{
      const row=document.createElement('div'); row.className='setting-row';
      const ageStr=p.birthDate?` ・ ${calcAge(p.birthDate,new Date().toISOString().slice(0,10))}`:'';
      row.innerHTML=`
        <div style="flex:1">
          <div class="setting-label">${escHtml(p.name)}</div>
          <div class="setting-desc">${p.birthDate?'生年月日: '+p.birthDate+ageStr:'生年月日未設定'}</div>
        </div>
        <button class="btn-mini purge">削除</button>
      `;
      row.querySelector('button').addEventListener('click',()=>removePerson(p.id));
      el.appendChild(row);
    });
  }
  function addPerson(){
    const name=document.getElementById('newPersonName').value.trim();
    if(!name){ showToast('名前を入力してください'); return; }
    const birth=getDateISO('pb'); // 未入力ならnull
    data.persons.push({ id:uid(), name, birthDate:birth, createdAt:new Date().toISOString() });
    document.getElementById('newPersonName').value='';
    fieldUpdate('pname');
    // 生年月日欄を空に戻す
    clearDateField('pb');
    saveData(); renderPersonList(); renderPersonTabs(); renderGrowthList();
    showToast(name+'を追加しました');
  }
  function removePerson(id){
    if(!confirm('この人物を削除しますか？（記録データは残ります）')) return;
    data.persons=data.persons.filter(p=>p.id!==id);
    if(currentPersonId===id) currentPersonId=data.persons[0]?.id||null;
    if(healthPersonId===id) healthPersonId='all';
    saveData(); renderPersonList(); renderPersonTabs(); renderGrowthList(); renderHealthList();
  }

  /* ============================================================ カテゴリ管理 ============================================================ */
  /* 色選択プルダウンの初期化（1度だけ） */
  function initCatColorSelect(){
    const sel=document.getElementById('newCatColor'); if(!sel||sel.options.length) return;
    const colorLabels={teal:'青緑',accent:'青',red:'赤',purple:'紫',orange:'橙',green:'緑',pink:'桃',text3:'灰'};
    CAT_COLORS.forEach(c=>{
      const o=document.createElement('option'); o.value=c; o.textContent=colorLabels[c]||c; sel.appendChild(o);
    });
  }
  /* カテゴリ一覧の描画（各行に削除ボタン） */
  function renderCategoryList(){
    const el=document.getElementById('categoryList'); if(!el) return;
    el.innerHTML='';
    const cats=getCategories();
    cats.forEach(c=>{
      // 使用件数（削除時の注意表示用）
      const used=data.healthRecords.filter(r=>!r.deleted && r.category===c.key).length;
      const row=document.createElement('div'); row.className='setting-row';
      row.innerHTML=`
        <div class="health-icon" style="width:30px;height:30px;font-size:15px;background:var(--${c.color}-soft);color:var(--${c.color})">${c.icon}</div>
        <div style="flex:1">
          <div class="setting-label">${escHtml(c.key)}</div>
          <div class="setting-desc">${used>0?used+'件で使用中':'未使用'}</div>
        </div>
        <button class="btn-mini purge">削除</button>
      `;
      row.querySelector('button').addEventListener('click',()=>removeCategory(c.key));
      el.appendChild(row);
    });
  }
  /* カテゴリ追加 */
  function addCategory(){
    const name=document.getElementById('newCatName').value.trim();
    if(!name){ showToast('カテゴリ名を入力してください'); return; }
    // 重複チェック
    if(getCategories().some(c=>c.key===name)){ showToast('同名のカテゴリが既にあります'); return; }
    const icon=(document.getElementById('newCatIcon').value.trim())||'🏷';
    const color=document.getElementById('newCatColor').value||'text3';
    // data.categoriesが空ならデフォルトを実体化してから追加
    if(!data.categories || !data.categories.length) data.categories=DEFAULT_CATEGORIES.map(c=>({...c}));
    data.categories.push({ key:name, icon, color });
    // 入力欄クリア
    document.getElementById('newCatName').value='';
    document.getElementById('newCatIcon').value='';
    fieldUpdate('catname');
    saveData(); renderCategoryList(); buildHealthCatPills();
    showToast(name+'を追加しました');
  }
  /* カテゴリ削除（使用中の記録は「その他」に付け替え） */
  function removeCategory(key){
    const cats=getCategories();
    if(cats.length<=1){ showToast('最後のカテゴリは削除できません'); return; }
    const used=data.healthRecords.filter(r=>!r.deleted && r.category===key).length;
    const msg=used>0
      ? `「${key}」を削除します。\nこのカテゴリの記録 ${used}件は「その他」に変更されます。よろしいですか？`
      : `「${key}」を削除しますか？`;
    if(!confirm(msg)) return;
    if(!data.categories || !data.categories.length) data.categories=DEFAULT_CATEGORIES.map(c=>({...c}));
    data.categories=data.categories.filter(c=>c.key!==key);
    // 付け替え先（「その他」が無ければ先頭カテゴリ）
    const fallback=data.categories.some(c=>c.key==='その他')?'その他':data.categories[0].key;
    data.healthRecords.forEach(r=>{ if(r.category===key) r.category=fallback; });
    // フィルタやモーダルの選択が消えたカテゴリを指していたら調整
    if(selectedCat===key) selectedCat=data.categories[0].key;
    if(healthCatFilter) healthCatFilter.delete(key);
    saveData(); renderCategoryList(); buildHealthCatPills(); renderHealthList();
    showToast('削除しました');
  }
  /* デフォルトに戻す */
  function resetCategories(){
    if(!confirm('カテゴリを初期状態に戻します。\n追加したカテゴリは削除されます（記録のカテゴリ名は残ります）。よろしいですか？')) return;
    data.categories=DEFAULT_CATEGORIES.map(c=>({...c}));
    selectedCat=data.categories[0].key;
    saveData(); renderCategoryList(); buildHealthCatPills(); renderHealthList();
    showToast('初期カテゴリに戻しました');
  }

  /* ============================================================ インポート（対象人物に紐付け） ============================================================ */
  function importJSON(e){
    const file=e.target.files?.[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const imported=JSON.parse(ev.target.result);
        // growthDataフォーマット（Excel変換データ）→ 人物紐付けUIを表示
        if(imported.growthData){
          pendingImport=imported;
          showImportMapping(imported);
        }
        // フルバックアップフォーマット
        else if(imported.persons!==undefined || imported.growth!==undefined){
          if(!confirm('現在のデータを上書きします。よろしいですか？')) return;
          data.persons=imported.persons||data.persons;
          data.growth=imported.growth||data.growth;
          data.healthRecords=imported.healthRecords||imported.healthRecords||data.healthRecords;
          saveData(); init(); showToast('インポート完了');
        }else{
          showToast('対応していない形式です');
        }
      }catch(err){ showToast('JSONの読み込みに失敗しました'); }
    };
    reader.readAsText(file);
    e.target.value='';
  }

  /* インポートデータの各personIdを、登録済み人物に割り当てるUI */
  function showImportMapping(imported){
    const desc=document.getElementById('importDesc');
    const wrap=document.getElementById('importMapping');
    if(data.persons.length===0){
      desc.innerHTML='⚠️ 先に「人物管理」で人物を追加してください。';
      wrap.innerHTML='';
      openModal('modalImport');
      return;
    }
    desc.textContent='インポートデータの各系列を、登録済みの人物に割り当ててください。';
    wrap.innerHTML='';
    imported.growthData.forEach((pd,i)=>{
      const count=pd.records.length;
      const field=document.createElement('div'); field.className='form-row';
      let opts='<option value="">（取り込まない）</option>';
      data.persons.forEach(p=> opts+=`<option value="${p.id}">${escHtml(p.name)}</option>`);
      // デフォルトで順番に割当
      const defaultId=data.persons[i]?.id||'';
      field.innerHTML=`
        <div class="form-field" style="flex:1">
          <label>系列 ${i+1}（${escHtml(pd.personId||'')} ・ ${count}件）→ 割当先</label>
          <select class="form-input import-map" data-idx="${i}">${opts}</select>
        </div>`;
      wrap.appendChild(field);
      field.querySelector('select').value=defaultId;
    });
    openModal('modalImport');
  }

  function confirmImport(){
    if(!pendingImport) return;
    const maps=[...document.querySelectorAll('.import-map')];
    let added=0;
    maps.forEach(sel=>{
      const idx=parseInt(sel.dataset.idx);
      const personId=sel.value;
      if(!personId) return;
      const pd=pendingImport.growthData[idx];
      pd.records.forEach(r=>{
        // 重複チェック（同person+同date）
        const exists=data.growth.some(g=>g.personId===personId && g.date===r.date);
        if(!exists){
          data.growth.push({
            id:uid(), personId, date:r.date,
            height:r.height??null, weight:r.weight??null,
            chestCirc:r.chestCirc??null, headCirc:r.headCirc??null,
            bmi:r.bmi??((r.height&&r.weight)?Math.round(r.weight/(r.height/100)**2*10)/10:null),
            note:'', createdAt:new Date().toISOString(),
          });
          added++;
        }
      });
    });
    pendingImport=null;
    normalizeData();   // 取り込み後に型を整える
    saveData();
    closeModal('modalImport');
    renderPersonTabs(); renderGrowthList();
    showToast(`${added}件を取り込みました`);
  }

  function exportJSON(){
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='karada-log-'+new Date().toISOString().slice(0,10)+'.json';
    a.click(); showToast('エクスポートしました');
  }
  function clearAllData(){
    if(!confirm('全ての記録を削除します。元に戻せません。')) return;
    data.growth=[]; data.healthRecords=[];
    saveData(); renderGrowthList(); renderHealthList(); renderTrash(); showToast('全データ削除しました');
  }

  /* ============================================================ GAS接続管理（接続・解除・状態表示） ============================================================ */
  /* 接続状態の表示更新（ステータス文言＋ボタン出し分け） */
  function renderGasStatus(){
    const statusEl=document.getElementById('gasStatus');
    const connectBtn=document.getElementById('gasConnectBtn');
    const disconnectBtn=document.getElementById('gasDisconnectBtn');
    const pushBtn=document.getElementById('btnPush');
    const pullBtn=document.getElementById('btnPull');
    if(!statusEl) return;
    const setOpacity=(v)=>{ if(pushBtn) pushBtn.style.opacity=v; if(pullBtn) pullBtn.style.opacity=v; };
    if(data.settings.gasConnected && data.settings.gasUrl){
      // 接続済み
      statusEl.innerHTML='<span style="color:var(--green)">●</span> <span style="color:var(--green)">接続済み</span>';
      connectBtn.textContent='🔄 再接続';
      connectBtn.style.display='';
      disconnectBtn.style.display='';
      setOpacity('1');
    }else{
      // 未接続
      statusEl.innerHTML='<span style="color:var(--text3)">○</span> <span style="color:var(--text3)">未接続</span>';
      connectBtn.textContent='🔗 接続';
      connectBtn.style.display='';
      disconnectBtn.style.display='none';
      setOpacity('.5');
    }
  }

  /* 接続ボタン：URLを保存し、実際に疎通確認してから接続状態にする
     POST(text/plain)を基本とし、失敗時はGETでフォールバック。
     エラー原因を画面に出して切り分けできるようにする。 */
  async function connectGas(){
    const url=(document.getElementById('gasUrl').value||'').trim();
    if(!url){ showToast('GAS URLを入力してください'); return; }
    if(!/^https:\/\/script\.google\.com\/.+\/exec/.test(url)){
      if(!confirm('URLが /exec で終わる正しい形式か確認してください。\nこのまま接続を試みますか？')) return;
    }
    const btn=document.getElementById('gasConnectBtn');
    const orig=btn.textContent;
    btn.textContent='接続中...'; btn.disabled=true;

    // 接続成功時の共通処理
    const onSuccess=(json)=>{
      data.settings.gasUrl=url;
      data.settings.gasConnected=true;
      if(json.data){
        applyMergedData(json.data);  // ID単位マージ（人物・記録の消失防止）
      }
      saveData(); renderGasStatus();
      renderPersonTabs(); renderGrowthList(); renderHealthList(); renderTrash(); renderPersonList();
      renderCategoryList(); buildHealthCatPills();
      showToast('✅ 接続しました（⬇受信済み）', 2600);
    };

    try{
      let json=null;
      // ── 試行1: POST（pull＝受信のみ。接続時に意図せずローカルを送信しない） ──
      try{
        const res=await fetch(url,{
          method:'POST',
          body:JSON.stringify({action:'pull'}),
          headers:{'Content-Type':'text/plain;charset=utf-8'},
          redirect:'follow',
        });
        const text=await res.text();
        // GASが正常ならJSON。HTML（ログイン画面等）が返る場合に備えてtextで受けてからパース
        try{ json=JSON.parse(text); }
        catch(parseErr){
          console.warn('POST応答がJSONでない:', text.slice(0,200));
          json=null;
        }
      }catch(postErr){
        console.warn('POST失敗:', postErr.message);
        json=null;
      }

      // ── 試行2: POSTがダメならGETで疎通だけ確認 ──
      if(!json){
        const res2=await fetch(url,{method:'GET',redirect:'follow'});
        const text2=await res2.text();
        try{ json=JSON.parse(text2); }
        catch(e2){
          // GETもJSONでない → 高確率でアクセス権/ログイン問題
          showToast('接続失敗: 応答がJSONではありません（アクセス権を「全員」にして再デプロイしてください）', 4000);
          return;
        }
      }

      if(json && json.status==='ok'){
        onSuccess(json);
      }else{
        showToast('接続エラー: '+(json && json.message ? json.message : '応答が不正です'), 3500);
      }
    }catch(e){
      // ネットワーク層の失敗（CORS / URL誤り / オフライン 等）
      console.error('connectGas error:', e);
      showToast('接続失敗: '+(e.message||'ネットワークエラー')+'（URLとネット接続を確認）', 4000);
    }finally{
      btn.textContent=orig; btn.disabled=false;
    }
  }

  /* 解除ボタン：接続フラグをOFFにする（URL自体は残すか確認） */
  function disconnectGas(){
    if(!confirm('GAS連携を解除します。\n（ローカルのデータは残ります）')) return;
    data.settings.gasConnected=false;
    saveData();
    renderGasStatus();
    showToast('🔌 連携を解除しました');
  }

  /* ============================================================ GAS送信・受信（分離） ============================================================ */
  /* 共通: GASへPOSTしてJSONを返す（失敗時はnull＋トースト） */
  async function gasRequest(action, includeData){
    const url=(document.getElementById('gasUrl')?.value||data.settings.gasUrl||'').trim();
    if(!url || !data.settings.gasConnected){
      showToast('先に設定タブでGASに接続してください'); switchTab('settings'); return null;
    }
    data.settings.gasUrl=url;
    const body={action};
    if(includeData){
      // 送信データ：削除済み(deleted:true)は除外し、有効なデータのみGASへ送る
      // （削除データはローカルのみに保持する仕様）
      const active = arr => (Array.isArray(arr)?arr:[]).filter(r=>!r.deleted);
      body.data = {
        persons: active(data.persons),
        growth: active(data.growth),
        healthRecords: active(data.healthRecords),
        categories: data.categories || [],
      };
    }
    // Content-Typeはtext/plainでCORSプリフライト回避
    const res=await fetch(url,{method:'POST',body:JSON.stringify(body),headers:{'Content-Type':'text/plain;charset=utf-8'},redirect:'follow'});
    const txt=await res.text();
    try{ return JSON.parse(txt); }
    catch(e){ showToast('失敗: 応答がJSONではありません'); return null; }
  }

  /* ⬆ 送信のみ: ローカルデータをGASへアップロード（受信・マージはしない） */
  async function pushToGas(){
    const btn=document.getElementById('btnPush'); btn.classList.add('busy');
    try{
      saveData();
      const json=await gasRequest('push', true);
      if(!json) return;
      if(json.status==='ok'){
        const c=json.counts||{};
        showToast(`⬆ 送信: 人物${c.persons??'?'} 成長${c.growth??'?'} 健康${c.healthRecords??'?'}`, 2800);
      }
      else showToast('送信エラー: '+(json.message||'不明'));
    }catch(e){ showToast('送信失敗: '+(e.message||'ネットワークエラー')); }
    finally{ btn.classList.remove('busy'); }
  }

  /* ⬇ 受信のみ: GASのデータを取得してローカルへマージ（送信はしない） */
  async function pullFromGas(){
    const btn=document.getElementById('btnPull'); btn.classList.add('busy');
    try{
      const json=await gasRequest('pull', false);
      if(!json) return;
      if(json.status==='ok'){
        if(json.data){
          applyMergedData(json.data);  // ID単位マージ
          // 受信後、選択中の人物が消えていたら有効な人物を選び直す
          if(!currentPersonId || !data.persons.some(p=>p.id===currentPersonId)){
            currentPersonId = data.persons[0]?.id || null;
          }
          saveData();
          renderPersonTabs(); renderGrowthList(); renderHealthList(); renderTrash(); renderPersonList();
          renderCategoryList(); buildHealthCatPills();
          // 受信件数を表示（同期できているか可視化）
          const np=data.persons.length, ng=data.growth.filter(r=>!r.deleted).length, nh=data.healthRecords.filter(r=>!r.deleted).length;
          showToast(`⬇ 受信: 人物${np} 成長${ng} 健康${nh}`, 2800);
        }else{
          showToast('⬇ 受信しましたがデータが空です', 2800);
        }
      }else showToast('受信エラー: '+(json.message||'不明'));
    }catch(e){ showToast('受信失敗: '+(e.message||'ネットワークエラー')); }
    finally{ btn.classList.remove('busy'); }
  }

  /* ============================================================ ユーティリティ ============================================================ */
  function showToast(msg,ms=2200){
    const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show');
    clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),ms);
  }
  function escHtml(s){ return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''; }

  /* モーダル外クリックで閉じる */
  document.querySelectorAll('.modal-overlay').forEach(o=>o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); }));

  return {
    init, toggleDark, switchTab,
    openAddModal, closeModal, saveGrowth, saveHealth,
    openEditGrowth, openEditHealth,
    softDelete, restoreItem, purgeItem, restoreAll, purgeAll, toggleItemLock,
    fieldUpdate, clearField, formKeyDown, healthBodyKeyDown,
    onDateTextInput, dateTextKeyDown, onDatePickerChange, openPicker, clearDateField,
    addPerson, removePerson,
    addCategory, removeCategory, resetCategories,
    importJSON, confirmImport, exportJSON, clearAllData, pushToGas, pullFromGas,
    connectGas, disconnectGas,
    openCatFilter, applyCatFilter, catFilterSelectAll,
    openPeriodFilter, applyPeriodFilter, clearPeriodFilter, resetHealthFilters,
  };
})();

document.addEventListener('DOMContentLoaded', App.init);

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('service-worker.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW registration failed:', err));
  });
}
